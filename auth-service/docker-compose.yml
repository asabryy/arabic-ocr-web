version: "3.8"
services:
  mysql:
    image: mysql:8
    container_name: auth-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  auth-service:
    build: .
    container_name: auth-service
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - mysql

volumes:
  mysql-data:
