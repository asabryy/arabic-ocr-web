apiVersion: v1
kind: ConfigMap
metadata:
  name: doc-manager-config
  namespace: textara
data:
  ALGORITHM: "HS256"
  STORAGE_BACKEND: "r2"
  UPLOAD_DIR: "/app/uploads"
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: "guest"
  RABBITMQ_QUEUE: "ocr_tasks"
  CORS_ORIGINS: '["https://textara.app","https://www.textara.app"]'
  # OCR backend: "modal" for prod, "http" for local dev (patched by local-k8s.sh)
  OCR_BACKEND: "modal"
