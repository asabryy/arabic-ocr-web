apiVersion: v1
kind: ConfigMap
metadata:
  name: doc-manager-config
  namespace: textara
data:
  ALGORITHM: "HS256"
  STORAGE_BACKEND: "r2"
  UPLOAD_DIR: "./uploads"
  rabbitmq_host: "rabbitmq"
  rabbitmq_port: "5672"
  rabbitmq_user: "textara"
  rabbitmq_queue: "ocr_tasks"
  CORS_ORIGINS: "https://textara.app,https://www.textara.app"
  # OCR backend: "modal" for prod, "http" for local dev
  OCR_BACKEND: "modal"
