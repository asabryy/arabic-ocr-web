version: '3.8'

services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env.dev
    ports:
      - "3000:80"
    depends_on:
      - backend
